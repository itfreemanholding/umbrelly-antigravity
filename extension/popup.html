<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: sans-serif;
            background: white;
            margin: 0;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 16px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-box:first-child {
            border-right: 1px solid #e2e8f0;
        }

        .stat-val {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 500;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #7c3aed;
        }

        .btn-outline {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .btn-outline:hover {
            background: #fef2f2;
        }
    </style>
</head>

<body>
    <h2>Scanner Sync Hub</h2>
    <div class="stats">
        <div class="stat-box">
            <div id="count-matches" class="stat-val" style="color: #10b981;">0</div>
            <div class="stat-label">Matches</div>
        </div>
        <div class="stat-box">
            <div id="count-rejected" class="stat-val" style="color: #64748b;">0</div>
            <div class="stat-label">Rejected</div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
